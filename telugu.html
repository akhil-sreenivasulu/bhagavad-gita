<!doctype html>
<html lang="te">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>భగవద్గీత పాఠకం</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="reader-body" data-language="te">
    <div class="page-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-panel">
        <section class="top-strip">
          <a class="secondary-link" href="index.html">ముఖ్య పుట</a>
          <a class="secondary-link" href="english.html">English</a>
        </section>

        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">శ్రీమద్భగవద్గీత</p>
            <h1 id="chapterTitle">లోడవుతోంది...</h1>
            <p class="chapter-summary" id="chapterSummary"></p>
            <div class="chapter-meta" id="chapterMeta"></div>
          </div>
          <div class="hero-art hero-art-circle">
            <img
              id="chapterImage"
              src="assets/images/bg01.jpg"
              alt="శ్రీకృష్ణుడు అర్జునుడు రథంపై ఉన్న చిత్రం"
            />
          </div>
        </section>

        <section class="control-bar">
          <div class="verse-rail" id="verseNav"></div>
          <div class="chapter-rail" id="chapterNav"></div>
        </section>

        <section class="player-card">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="audioEyebrow">అధ్యాయ పారాయణం</p>
              <h2 id="audioTitle">ఆడియో</h2>
            </div>
            <button class="secondary-link button-link" id="ambienceToggle" type="button">
              నేపథ్య ధ్వని ఆఫ్
            </button>
          </div>
          <audio class="native-audio" id="chapterAudio" controls preload="metadata"></audio>
          <audio id="ambienceAudio" preload="metadata" loop src="assets/bg-full.mp3"></audio>
        </section>

        <article class="shloka-card">
          <div class="verse-header">
            <p class="eyebrow" id="verseLocation">శ్లోకం</p>
            <div class="jump-actions">
              <button id="prevVerse" type="button">మునుపటి</button>
              <button id="nextVerse" type="button">తర్వాతి</button>
            </div>
          </div>

          <div class="shloka-text" id="verseText"></div>
          <div class="transliteration" id="transliteration"></div>
          <div class="meaning-block">
            <h3 id="meaningHeading">అర్థం</h3>
            <p id="verseMeaning"></p>
          </div>
          <details class="word-meanings">
            <summary id="wordMeaningLabel">పదార్థం</summary>
            <p id="wordMeanings"></p>
          </details>
        </article>

        <section class="jump-grid-wrap">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="jumpEyebrow">ఏ శ్లోకానికైనా వెళ్లండి</p>
              <h2 id="jumpHeading">శ్లోక సూచిక</h2>
            </div>
            <p id="jumpLabel"></p>
          </div>
          <div class="jump-grid" id="jumpGrid"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
