<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhagavad Gita Reader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="reader-body" data-language="en">
    <div class="page-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-panel">
        <section class="top-strip">
          <a class="secondary-link" href="index.html">Home</a>
          <a class="secondary-link" href="telugu.html">తెలుగు</a>
        </section>

        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Srimad Bhagavad Gita</p>
            <h1 id="chapterTitle">Loading...</h1>
            <p class="chapter-summary" id="chapterSummary"></p>
            <div class="chapter-meta" id="chapterMeta"></div>
          </div>
          <div class="hero-art hero-art-circle">
            <img
              id="chapterImage"
              src="assets/images/bg01.jpg"
              alt="Lord Krishna and Arjuna on the chariot"
            />
          </div>
        </section>

        <section class="control-bar">
          <div class="verse-rail" id="verseNav"></div>
          <div class="chapter-rail" id="chapterNav"></div>
        </section>

        <section class="player-card">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="audioEyebrow">Chapter Recitation</p>
              <h2 id="audioTitle">Audio</h2>
            </div>
            <button class="secondary-link button-link" id="ambienceToggle" type="button">
              Ambience Off
            </button>
          </div>
          <audio class="native-audio" id="chapterAudio" controls preload="metadata"></audio>
          <audio id="ambienceAudio" preload="metadata" loop src="assets/bg-full.mp3"></audio>
        </section>

        <article class="shloka-card">
          <div class="verse-header">
            <p class="eyebrow" id="verseLocation">Verse</p>
            <div class="jump-actions">
              <button id="prevVerse" type="button">Prev</button>
              <button id="nextVerse" type="button">Next</button>
            </div>
          </div>

          <div class="shloka-text" id="verseText"></div>
          <div class="transliteration" id="transliteration"></div>
          <div class="meaning-block">
            <h3 id="meaningHeading">Meaning</h3>
            <p id="verseMeaning"></p>
          </div>
          <details class="word-meanings">
            <summary id="wordMeaningLabel">Word-by-word meaning</summary>
            <p id="wordMeanings"></p>
          </details>
        </article>

        <section class="jump-grid-wrap">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="jumpEyebrow">Jump To Any Shloka</p>
              <h2 id="jumpHeading">Verse Navigator</h2>
            </div>
            <p id="jumpLabel"></p>
          </div>
          <div class="jump-grid" id="jumpGrid"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
